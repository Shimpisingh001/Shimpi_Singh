<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Css card Design</title>
    <style>
        body{
            background-color: grey;

        }
        .card{
            background-color:rgb(246, 242, 244);
            width:230px;
            height:440px;
            border-radius:7px;
        }
        .image{
            padding:5px;
        }
        .image img{
            border-radius: 7px;
        }
        .content {
            background-color: aqua;
            font-size:14px;
            padding: 0 40px;
        }
        .capsules{
            padding: 0 40px;
        }
        .capsules span{
            background-color: rgb(201, 10, 128);
            border:2px solid black;
            padding:4px;
            border-radius: 7px;
            font-family:'Baloo Bhai 2',
            sans-serif;
        }
        .button{
            text-align:center;
        }
        .button button{
            padding:0px 3px;
            border-radius:9px;
            background-color:rgb(162, 223, 185)

        }
    </style>
</head>
<body>
    <div class="card">
        <div class="image">
            <img width="188" src="https://p1.pxfuel.com/preview/96/900/1000/small-boat-single-crew-boat-man-in-boat-boat-lake-river.jpg" alt="">
    </div>
    <div class="capsules">
        <span>Nature</span>
        <span>Lake</span>
    </div>
    <div class="capsules"></div>
    <div class="content">
        <h1>Shimpi</h1>
        <p>Lorem ipsum dolor, sit amet consectetur adipisicing elit. Impedit corrupti ea quas nemo officia? Velit earum facilis voluptates doloribus ipsum. Placeat, repellat voluptates?</p>
        </div>
        <div class="button">
            <button>Submit</button>
        </button>
    
</body>
</html>
